<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLflow — MCP Servers</title>
<style>
/* ===== DuBois Design Tokens ===== */
:root {
  /* Primary */
  --color-primary: #2272B4;
  --color-primary-hover: #0E538B;
  --color-primary-press: #04355D;

  /* Text */
  --color-text-primary: #11171C;
  --color-text-secondary: #5F7281;
  --color-text-placeholder: #8396A5;
  --color-text-white: #FFFFFF;

  /* Backgrounds */
  --color-bg-primary: #FFFFFF;
  --color-bg-secondary: #F6F7F9;
  --color-bg-table-header: #FAFBFC;
  --color-bg-code: #1F272D;

  /* Borders */
  --color-border: #D1D9E1;
  --color-border-input: #C0CDD8;
  --color-border-light: #E8ECF0;
  --color-border-row: #F0F2F4;

  /* State: hover / selected */
  --color-hover-bg: rgba(68,83,95,0.04);
  --color-selected-bg: rgba(68,83,95,0.08);
  --color-action-hover-bg: rgba(34,114,180,0.08);
  --color-action-press-bg: rgba(34,114,180,0.16);

  /* Danger */
  --color-danger: #C82D4C;

  /* AI Gradient */
  --gradient-ai: linear-gradient(135deg, #4299E0 20.5%, #CA42E0 46.91%, #FF5F46 79.5%);
  --color-3next: #CA42E0;

  /* Badge: Draft (default) */
  --badge-default-bg: rgba(0,0,59,0.05);
  --badge-default-text: #11171C;
  /* Badge: Published (lime) */
  --badge-lime-bg: rgba(2,179,2,0.08);
  --badge-lime-text: #203C25;
  --badge-lime-icon: #227534;
  /* Badge: Deprecated (lemon) */
  --badge-lemon-bg: rgba(255,191,1,0.18);
  --badge-lemon-text: #4F3422;
  /* Badge: Retired (charcoal) */
  --badge-charcoal-bg: #37444F;
  --badge-charcoal-text: #E8ECF0;
  /* Badge: Rejected (coral) */
  --badge-coral-bg: rgba(240,0,64,0.06);
  --badge-coral-text: #64172B;
  /* Badge: Policy (indigo) */
  --badge-indigo-bg: rgba(1,68,255,0.06);
  --badge-indigo-text: #101D46;

  /* Green dot / checkmark */
  --color-green: #3CAA60;

  /* Typography */
  --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
  --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 13px;
  --font-size-lg: 14px;
  --font-size-xl: 18px;
  --font-size-xxl: 22px;
  --line-height-base: 20px;
  --line-height-xl: 28px;

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;

  /* Sizing */
  --height-button: 32px;
  --height-input: 32px;
  --sidebar-width: 190px;

  /* Radius */
  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;

  /* Shadows */
  --shadow-card: 0px 3px 6px 0px rgba(0,0,0,0.05);
  --shadow-dropdown: 0px 2px 16px rgba(0,0,0,0.08);
  --shadow-modal: 0px 8px 40px rgba(0,0,0,0.13);
}

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: var(--font-family);
  font-size: var(--font-size-base);
  line-height: var(--line-height-base);
  color: var(--color-text-primary);
  background: var(--color-bg-secondary);
}
a { color: var(--color-primary); text-decoration: none; }
a:hover { color: var(--color-primary-hover); }
button { font-family: var(--font-family); cursor: pointer; }
input, textarea, select { font-family: var(--font-family); }

/* ===== App Shell ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: var(--sidebar-width);
  background: var(--color-bg-primary);
  border-right: 1px solid var(--color-border-light);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 16px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-logo-text { display: flex; align-items: center; gap: 4px; }
.sidebar-logo-text .version { font-size: var(--font-size-xs); color: var(--color-text-placeholder); }

/* Workflow switcher */
.workflow-switch {
  margin: 8px 12px 12px;
  position: relative;
  display: flex;
  height: 32px;
  border-radius: var(--radius-md);
  overflow: visible;
}
.workflow-switch-border {
  position: absolute; inset: -1px;
  border-radius: 7px;
  background: var(--gradient-ai);
  z-index: 0;
}
.workflow-switch-inner {
  position: absolute; inset: 1px;
  border-radius: 5px;
  background: var(--color-bg-secondary);
  z-index: 1;
}
.workflow-switch-pill {
  position: relative; z-index: 2;
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--font-size-sm);
  border-radius: var(--radius-sm);
  margin: 3px;
  cursor: pointer;
  transition: all 0.2s ease-out;
}
.workflow-switch-pill.active {
  background: white;
  font-weight: 600;
  color: var(--color-text-primary);
  box-shadow: 0px 1px 2px rgba(0,0,0,0.08);
}
.workflow-switch-pill.inactive {
  color: var(--color-text-placeholder);
  margin-left: 0;
}

/* Nav items */
.nav-section { display: flex; flex-direction: column; gap: 1px; padding: 0 8px; flex: 1; }
.nav-item {
  padding: 8px 8px;
  display: flex; align-items: center; gap: 10px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  color: var(--color-text-primary);
  cursor: pointer;
  transition: background 0.15s;
}
.nav-item:hover { background: var(--color-action-hover-bg); }
.nav-item.active {
  background: var(--color-action-press-bg);
  color: var(--color-primary-hover);
  font-weight: 600;
}
.nav-item .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
.nav-bottom {
  display: flex; flex-direction: column; gap: 1px;
  padding: 8px;
  border-top: 1px solid var(--color-border-light);
}
.nav-bottom .nav-item { color: var(--color-text-secondary); }

/* Content area */
.content-area {
  flex: 1;
  margin: var(--space-sm);
  background: var(--color-bg-primary);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

/* ===== Page Header ===== */
.page-header { padding: 20px var(--space-lg) 0; }
.breadcrumb {
  display: flex; align-items: center; gap: 6px;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-sm);
}
.breadcrumb a { color: var(--color-primary); }
.title-row {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: var(--space-md);
}
.title-row h1 {
  font-size: var(--font-size-xxl);
  font-weight: 600;
  line-height: var(--line-height-xl);
  display: flex; align-items: center; gap: 10px;
}
.title-row .subtitle {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  margin-top: 2px;
}
.title-actions { display: flex; align-items: center; gap: 12px; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: var(--height-button);
  padding: 0 16px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  font-weight: 400;
  border: none;
  transition: background 0.15s;
}
.btn-primary {
  background: var(--color-primary);
  color: white;
}
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-secondary {
  background: white;
  color: var(--color-text-primary);
  border: 1px solid var(--color-border-input);
}
.btn-secondary:hover {
  border-color: var(--color-primary);
  background: var(--color-action-hover-bg);
}
.btn-danger {
  background: var(--color-danger);
  color: white;
}

/* ===== Feature Toggle ===== */
.feature-toggle {
  display: flex; align-items: center; gap: 6px;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}
.feature-toggle .label-active { font-weight: 600; color: var(--color-text-primary); }
.toggle-track {
  width: 36px; height: 20px;
  background: var(--color-border);
  border-radius: 10px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.toggle-track.on { background: var(--color-primary); }
.toggle-thumb {
  width: 16px; height: 16px;
  background: white;
  border-radius: 50%;
  position: absolute; top: 2px; left: 2px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  transition: left 0.2s ease-out;
}
.toggle-track.on .toggle-thumb { left: 18px; }

/* ===== 3.next Banner ===== */
.next-banner {
  padding: 10px 16px;
  background: linear-gradient(135deg, rgba(66,153,224,0.06) 20%, rgba(202,66,224,0.06) 35%, rgba(255,95,70,0.06) 50%, transparent 80%);
  border-bottom: 1px solid var(--color-border-light);
  display: flex; align-items: center; gap: 8px;
  font-size: var(--font-size-xs);
  color: var(--color-text-placeholder);
}
.next-banner .feature-toggle { margin-right: 8px; }
.next-label {
  font-size: var(--font-size-xs);
  color: var(--color-3next);
  font-weight: 500;
  margin-left: 4px;
}

/* ===== Filters ===== */
.filter-bar {
  padding: 0 var(--space-lg) var(--space-md);
  display: flex; gap: var(--space-sm);
}
.filter-bar .search-wrapper { flex: 1; position: relative; }
.filter-bar .search-icon {
  position: absolute; left: 10px; top: 9px;
  width: 14px; height: 14px;
  color: var(--color-text-placeholder);
}
.filter-bar input[type="text"] {
  width: 100%;
  padding: 6px 12px 6px 30px;
  height: var(--height-input);
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  color: var(--color-text-primary);
  outline: none;
}
.filter-bar input:focus { border-color: var(--color-primary); }
.filter-bar select {
  padding: 6px 12px;
  height: var(--height-input);
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  color: var(--color-text-secondary);
  background: white;
  cursor: pointer;
}

/* ===== Table ===== */
.data-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-base); }
.data-table thead tr {
  border-bottom: 1px solid var(--color-border-light);
  background: var(--color-bg-table-header);
}
.data-table th {
  text-align: left;
  padding: 10px 12px;
  font-weight: 600;
  color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
  white-space: nowrap;
}
.data-table th:first-child { padding-left: 16px; }
.data-table td { padding: 12px 12px; }
.data-table td:first-child { padding-left: 16px; }
.data-table tbody tr {
  border-bottom: 1px solid var(--color-border-row);
  cursor: pointer;
  transition: background 0.1s;
}
.data-table tbody tr:hover { background: var(--color-hover-bg); }
.data-table .col-3next { border-left: 2px solid rgba(202,66,224,0.2); }
.data-table th.col-3next { color: var(--color-3next); }

/* ===== Badges ===== */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  white-space: nowrap;
}
.badge-default { background: var(--badge-default-bg); color: var(--badge-default-text); }
.badge-lime { background: var(--badge-lime-bg); color: var(--badge-lime-text); }
.badge-lemon { background: var(--badge-lemon-bg); color: var(--badge-lemon-text); }
.badge-charcoal { background: var(--badge-charcoal-bg); color: var(--badge-charcoal-text); }
.badge-coral { background: var(--badge-coral-bg); color: var(--badge-coral-text); }
.badge-indigo { background: var(--badge-indigo-bg); color: var(--badge-indigo-text); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-xs);
  background: var(--badge-default-bg);
  color: var(--badge-default-text);
}
.tag .tag-key { color: var(--color-text-secondary); }
.tag .tag-remove {
  background: none; border: none;
  color: var(--color-text-placeholder);
  font-size: 14px; line-height: 1;
  padding: 0 2px; cursor: pointer;
}

/* ===== Server Icon ===== */
.server-icon {
  width: 24px; height: 24px;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.server-icon.large { width: 32px; height: 32px; border-radius: var(--radius-md); font-size: 14px; }

/* ===== Pagination ===== */
.pagination {
  padding: 12px 16px;
  border-top: 1px solid var(--color-border-light);
  display: flex; justify-content: space-between; align-items: center;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

/* ===== Collapsible Sections ===== */
.section-block { padding: 0 var(--space-lg); }
.section-block .section-inner { padding: 16px 0; border-bottom: 1px solid var(--color-border-row); }
.section-block:last-child .section-inner { border-bottom: none; }
.section-header {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 12px;
  cursor: pointer;
  user-select: none;
}
.section-header .chevron {
  width: 10px; height: 10px;
  transition: transform 0.15s;
}
.section-header.collapsed .chevron { transform: rotate(-90deg); }
.section-header h3 {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text-primary);
}
.section-header .section-meta {
  font-size: var(--font-size-sm);
  color: var(--color-text-placeholder);
  font-weight: 400;
}
.section-header .section-action {
  margin-left: auto;
  font-size: var(--font-size-sm);
  color: var(--color-primary);
  background: none; border: none; cursor: pointer;
}
.section-content { overflow: hidden; }
.section-content.hidden { display: none; }

/* Metadata grid */
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: var(--space-md);
}
.meta-item .meta-label {
  font-size: var(--font-size-xs);
  color: var(--color-text-placeholder);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: var(--space-xs);
}

/* ===== Tools Grid ===== */
.tools-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-sm);
}
.tool-card {
  padding: 8px 12px;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 8px;
}
.tool-name {
  font-size: var(--font-size-sm);
  color: var(--color-primary-hover);
  background: var(--color-action-hover-bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
}
.tool-desc { font-size: var(--font-size-sm); color: var(--color-text-secondary); }

/* ===== Code Block ===== */
.code-block {
  background: var(--color-bg-code);
  border-radius: var(--radius-sm);
  padding: var(--space-md);
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  color: #E8ECF0;
  line-height: 1.7;
  max-height: 160px;
  overflow-y: auto;
}
.code-block .key { color: #4299E0; }
.code-block .str { color: #3CAA60; }
.code-block .punct { color: var(--color-text-placeholder); }
.code-block .dim { color: #F8D4A5; }

/* ===== Deployment Card ===== */
.deploy-card {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
}

/* ===== Governance Grid (3.next) ===== */
.governance-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.governance-card {
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-md);
  padding: 14px;
}
.governance-card .gc-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.governance-card .gc-label {
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.governance-card .gc-body {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  line-height: 1.6;
}

/* ===== Audit Trail ===== */
.audit-trail {
  border-left: 2px solid var(--color-border-light);
  padding-left: var(--space-md);
  margin-left: var(--space-sm);
}
.audit-entry { position: relative; padding-bottom: var(--space-md); }
.audit-entry:last-child { padding-bottom: 0; }
.audit-dot {
  position: absolute;
  left: -22px; top: 2px;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid white;
}
.audit-title { font-size: var(--font-size-sm); font-weight: 500; color: var(--color-text-primary); }
.audit-meta { font-size: var(--font-size-xs); color: var(--color-text-placeholder); }

/* ===== Modals ===== */
.modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 100;
  align-items: flex-start;
  justify-content: center;
  padding-top: 80px;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: white;
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-modal);
  max-height: calc(100vh - 120px);
  overflow-y: auto;
}
.modal-header {
  padding: 20px var(--space-lg) 16px;
  border-bottom: 1px solid var(--color-border-light);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-header h2 {
  font-size: var(--font-size-xl);
  font-weight: 600;
}
.modal-close {
  background: none; border: none;
  color: var(--color-text-placeholder);
  font-size: 20px; line-height: 1;
  cursor: pointer;
}
.modal-body { padding: 20px var(--space-lg); }
.modal-footer {
  padding: 16px var(--space-lg);
  border-top: 1px solid var(--color-border-light);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* Form fields */
.form-group { margin-bottom: 20px; }
.form-label {
  display: block;
  font-size: var(--font-size-base);
  font-weight: 600;
  margin-bottom: 6px;
}
.form-label .required { color: var(--color-danger); }
.form-hint {
  font-size: var(--font-size-xs);
  color: var(--color-text-placeholder);
  margin-top: var(--space-xs);
}
.form-input {
  width: 100%;
  padding: 8px 12px;
  height: 36px;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  color: var(--color-text-primary);
  outline: none;
}
.form-input:focus { border-color: var(--color-primary); }
.form-textarea {
  width: 100%;
  padding: 8px 12px;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  color: var(--color-text-primary);
  outline: none;
  resize: vertical;
}

/* Segmented control */
.seg-control {
  display: flex;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.seg-control button {
  flex: 1;
  padding: 8px;
  font-size: var(--font-size-sm);
  border: none;
  background: white;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-family: var(--font-family);
}
.seg-control button + button { border-left: 1px solid var(--color-border-input); }
.seg-control button.active {
  background: var(--color-text-primary);
  color: white;
}

/* Tab bar */
.tab-bar { display: flex; gap: 0; margin-bottom: var(--space-sm); }
.tab-bar button {
  padding: 6px 16px;
  font-size: var(--font-size-sm);
  background: white;
  color: var(--color-text-secondary);
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  cursor: pointer;
  font-family: var(--font-family);
}
.tab-bar button + button { margin-left: -1px; }
.tab-bar button.active {
  background: var(--color-bg-secondary);
  color: var(--color-text-primary);
  font-weight: 600;
  border-bottom: 2px solid var(--color-primary);
}

/* Info alert */
.info-alert {
  padding: 12px;
  border-left: 3px solid var(--color-primary);
  background: var(--color-action-hover-bg);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-size: var(--font-size-sm);
  color: #445461;
  line-height: 1.5;
}
.info-banner {
  padding: 12px;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; gap: 10px;
  font-size: var(--font-size-sm);
  color: #445461;
}

/* Lifecycle dropdown */
.lifecycle-dropdown-wrapper { position: relative; }
.lifecycle-btn {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  cursor: pointer;
  background: white;
  height: var(--height-button);
}
.lifecycle-btn:hover { border-color: var(--color-primary); }
.lifecycle-menu {
  display: none;
  position: absolute; top: 100%; left: 0;
  margin-top: 4px;
  width: 260px;
  background: white;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-dropdown);
  z-index: 50;
}
.lifecycle-menu.visible { display: block; }
.lifecycle-menu-header {
  padding: 8px 12px;
  font-size: var(--font-size-xs);
  color: var(--color-text-placeholder);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--color-border-row);
}
.lifecycle-menu-item {
  padding: 10px 12px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
  border-bottom: 1px solid var(--color-border-row);
  transition: background 0.1s;
}
.lifecycle-menu-item:last-child { border-bottom: none; }
.lifecycle-menu-item:hover { background: var(--color-hover-bg); }
.lifecycle-menu-item .lmi-desc { font-size: var(--font-size-xs); color: var(--color-text-placeholder); margin-top: 2px; }

/* Transition modal specifics */
.transition-visual {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: var(--space-md);
  background: var(--color-bg-secondary);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
}
.transition-arrow { color: var(--color-primary); }

/* Overflow menu */
.overflow-btn {
  border: 1px solid var(--color-border-input);
  border-radius: var(--radius-sm);
  background: white;
  padding: 6px 10px;
  height: var(--height-button);
  display: flex; align-items: center;
}
.overflow-btn:hover { border-color: var(--color-primary); }

/* Status dot */
.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.status-dot.green { background: var(--color-green); }
.status-dot.grey { background: var(--color-text-placeholder); }

/* Deploy dot (larger, in table) */
.deploy-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  display: inline-block;
}

/* Verified icon */
.verified-icon { color: var(--color-green); }
.unverified-icon { color: var(--color-border); }

/* Show more link */
.show-more {
  padding: 8px 0;
  text-align: center;
  font-size: var(--font-size-sm);
}

/* Schema table */
.schema-table { width: 100%; border-collapse: collapse; }
.schema-table th {
  text-align: left; padding: 8px 12px;
  font-weight: 600; color: var(--color-text-secondary);
  font-size: var(--font-size-sm);
  background: var(--color-bg-table-header);
  border-bottom: 1px solid var(--color-border-light);
}
.schema-table td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--color-border-row);
}
.schema-table .schema-type {
  font-family: var(--font-mono);
  font-size: var(--font-size-xs);
  color: var(--color-text-secondary);
}

/* Tags inline editor */
.tags-inline {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.tag-add-btn {
  padding: 3px 10px;
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  background: transparent;
  color: var(--color-primary);
  border: 1px dashed var(--color-border-input);
  cursor: pointer;
}

/* Utility: hide */
.hidden { display: none !important; }

/* View containers */
.view { display: none; flex-direction: column; height: 100%; }
.view.active { display: flex; }
</style>
</head>

function getLifecycleBadgeClass(state) {
  switch (state) {
    case 'Published': return 'badge-lime';
    case 'Draft': return 'badge-default';
    case 'Deprecated': return 'badge-lemon';
    case 'Retired': return 'badge-charcoal';
    case 'Candidate': return 'badge-lemon';
    default: return 'badge-default';
  }
}

function getApprovalBadgeClass(status) {
  switch (status) {
    case 'Approved': return 'badge-lime';
    case 'Pending': return 'badge-lemon';
    case 'Rejected': return 'badge-coral';
    default: return 'badge-default';
  }
}

function getCertBadgeClass(status) {
  switch (status) {
    case 'Certified': return 'badge-lime';
    case 'Candidate': return 'badge-lemon';
    case 'Expired': return 'badge-coral';
    default: return 'badge-default';
  }
}

function getValidTransitions(currentState) {
  switch (currentState) {
    case 'Draft': return [
      { state: 'Published', desc: 'Make available for consumption', icon: '✓' }
    ];
    case 'Published': return [
      { state: 'Deprecated', desc: 'Mark as superseded, still accessible', icon: '⚠' }
    ];
    case 'Deprecated': return [
      { state: 'Retired', desc: 'Remove from active use', icon: '✕' }
    ];
    default: return [];
  }
}

function getTransitionVerb(targetState) {
  switch (targetState) {
    case 'Published': return 'Publish';
    case 'Deprecated': return 'Deprecate';
    case 'Retired': return 'Retire';
    default: return 'Transition';
  }
}

function getTransitionMessage(targetState) {
  switch (targetState) {
    case 'Published': return 'Publishing this version will make it available for consumption through the catalog and Gen AI Studio. Other published versions of this MCP server will remain published.';
    case 'Deprecated': return 'Deprecating this version marks it as superseded. It remains accessible but consumers will be encouraged to migrate to a newer version.';
    case 'Retired': return 'Retiring this version removes it from active use. It will no longer be available for consumption.';
    default: return '';
  }
}

function filteredServers() {
  return MCP_SERVERS.filter(s => {
    const latest = getLatestVersion(s);
    if (state.filterState !== 'all' && latest.state !== state.filterState) return false;
    if (state.filterSource !== 'all' && s.source !== state.filterSource) return false;
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      return s.name.toLowerCase().includes(q) || s.description.toLowerCase().includes(q);
    }
    return true;
  });
}

      <!-- Audit Trail (3.next) -->
      <div class="section-block" style="padding-bottom:24px;">
        <div class="section-inner" style="border-bottom:none;">
          <div class="section-header" onclick="toggleSection('detail-audit')">
            ${CHEVRON_SVG}
            <h3>Audit Trail</h3>
            <span class="next-label">Future</span>
          </div>
          <div class="section-content" id="section-detail-audit">
            <div class="audit-trail">
              ${latest.audit.map(a => `
              <div class="audit-entry">
                <div class="audit-dot" style="background:${a.color};"></div>
                <div class="audit-title">${a.action}</div>
                <div class="audit-meta">${a.at} · ${a.by}${a.comment ? ` · "${a.comment}"` : ''}</div>
              </div>`).join('')}
            </div>
          </div>
        </div>
      </div>` : ''}
    </div>
  `;
}

function openVersion(serverId, versionNum) {
  state.currentView = 'version';
  state.selectedServerId = serverId;
  state.selectedVersionNum = versionNum;
  state.showAllTools = false;
  render();
}

function toggleLifecycleMenu(context) {
  const menu = document.getElementById('lifecycle-menu-' + context);
  if (menu) menu.classList.toggle('visible');
}

function toggleSection(key) {
  const content = document.getElementById('section-' + key);
  const header = content?.previousElementSibling;
  if (content) {
    content.classList.toggle('hidden');
    if (header) header.classList.toggle('collapsed');
  }
}

function renderVersionView() {
  const server = getServer(state.selectedServerId);
  if (!server) return;
  const version = getVersion(server, state.selectedVersionNum);
  if (!version) return;
  const is3next = state.featureToggle;
  const versionTags = Object.entries(version.tags || {});
  const toolsToShow = state.showAllTools ? server.tools : server.tools.slice(0, 6);

  const serverJson = JSON.stringify({
    name: server.id + '-mcp',
    version: version.semver,
    transport: 'streamable-http',
    tools: server.tools.slice(0, 5).map(t => ({ name: t.name, description: t.desc }))
  }, null, 2);

  const highlightedJson = serverJson
    .replace(/"([^"]+)":/g, '<span class="key">"$1"</span>:')
    .replace(/: "([^"]+)"/g, ': <span class="str">"$1"</span>')
    .replace(/[{}\[\]]/g, '<span class="punct">$&</span>');

  document.getElementById('view-version').innerHTML = `
    ${is3next ? `
    <div class="next-banner">
      <div class="feature-toggle">
        <span>MVP</span>
        <div class="toggle-track on" onclick="toggleFeature()"><div class="toggle-thumb"></div></div>
        <span class="label-active">Future</span>
      </div>
      <span>Showing future governance features</span>
    </div>` : ''}

    <div class="page-header" style="border-bottom:1px solid var(--color-border-light);">
      <div class="breadcrumb">
        <a href="#" onclick="navigateTo('mcp-servers');return false;">MCP Servers</a>
        <span style="color:var(--color-border);">/</span>
        <a href="#" onclick="openDetail('${server.id}');return false;">${server.name}</a>
        <span style="color:var(--color-border);">/</span>
        <span>Version ${version.num}</span>
      </div>
      <div class="title-row">
        <div>
          <h1 style="font-size:22px;">Version ${version.num}</h1>
          <div class="subtitle">${server.name}</div>
        </div>
        <div class="title-actions">
          ${!is3next ? `
          <div class="feature-toggle">
            <span class="label-active">MVP</span>
            <div class="toggle-track" onclick="toggleFeature()"><div class="toggle-thumb"></div></div>
            <span>Future</span>
          </div>` : ''}
          <div class="lifecycle-dropdown-wrapper">
            <button class="lifecycle-btn" onclick="toggleLifecycleMenu('version')">
              <span class="badge ${getLifecycleBadgeClass(version.state)}">${version.state}</span>
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="#5F7281" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="lifecycle-menu" id="lifecycle-menu-version">
              <div class="lifecycle-menu-header">Transition to</div>
              ${getValidTransitions(version.state).map(t => `
              <div class="lifecycle-menu-item" onclick="openTransitionModal('${server.id}', ${version.num}, '${version.state}', '${t.state}')">
                <span>${t.icon}</span>
                <div>
                  <span class="badge ${getLifecycleBadgeClass(t.state)}">${t.state}</span>
                  <div class="lmi-desc">${t.desc}</div>
                </div>
              </div>`).join('')}
            </div>
          </div>
          <button class="overflow-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="3" r="1" fill="#445461"/><circle cx="7" cy="7" r="1" fill="#445461"/><circle cx="7" cy="11" r="1" fill="#445461"/></svg>
          </button>
        </div>
      </div>
    </div>

    <div style="flex:1;overflow-y:auto;">
      <!-- Metadata -->
      <div class="section-block">
        <div class="section-inner">
          <div class="section-header" onclick="toggleSection('ver-meta')">
            ${CHEVRON_SVG}
            <h3>Metadata</h3>
          </div>
          <div class="section-content" id="section-ver-meta">
            <div class="meta-grid">
              <div class="meta-item"><div class="meta-label">Registered At</div><div>${version.registeredAt}</div></div>
              <div class="meta-item"><div class="meta-label">Last Modified</div><div>${version.lastModified}</div></div>
              <div class="meta-item"><div class="meta-label">Creator</div><div>${version.createdBy}</div></div>
              <div class="meta-item"><div class="meta-label">Version</div><div style="font-family:var(--font-mono);">${version.semver}</div></div>
              <div class="meta-item"><div class="meta-label">Source Run</div><div><a href="#" style="font-family:var(--font-mono);font-size:12px;">${version.sourceRun || 'N/A'}</a></div></div>
              <div class="meta-item"><div class="meta-label">Lifecycle State</div><div><span class="badge ${getLifecycleBadgeClass(version.state)}">${version.state}</span></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Deployment -->
      <div class="section-block">
        <div class="section-inner">
          <div class="section-header" onclick="toggleSection('ver-deploy')">
            ${CHEVRON_SVG}
            <h3>Deployment</h3>
            ${version.deployed ? '<span class="badge badge-lime" style="margin-left:4px;"><span class="status-dot green" style="width:6px;height:6px;"></span> Active</span>' : '<span class="badge badge-default" style="margin-left:4px;">Not Deployed</span>'}
          </div>
          <div class="section-content" id="section-ver-deploy">
            ${version.deployed ? `
            <div class="deploy-card">
              <div class="meta-grid">
                <div class="meta-item"><div class="meta-label">Namespace</div><div style="font-family:var(--font-mono);font-size:12px;">${version.namespace}</div></div>
                <div class="meta-item"><div class="meta-label">Endpoint</div><div style="color:var(--color-primary);font-family:var(--font-mono);font-size:12px;">${version.endpoint}</div></div>
                <div class="meta-item"><div class="meta-label">Gateway Registered</div><div style="display:flex;align-items:center;gap:4px;">${version.gatewayRegistered ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5.5" stroke="#3CAA60" stroke-width="1.5"/><path d="M4.5 7l2 2 3.5-4" stroke="#3CAA60" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="color:#203C25;font-size:12px;">Yes</span>' : '<span style="color:var(--color-text-secondary);font-size:12px;">No</span>'}</div></div>
              </div>
            </div>` : '<p style="color:var(--color-text-secondary);">This version has not been deployed.</p>'}
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="section-block">
        <div class="section-inner">
          <div class="section-header" onclick="toggleSection('ver-desc')">
            ${CHEVRON_SVG}
            <h3>Description</h3>
            <button class="section-action">Edit</button>
          </div>
          <div class="section-content" id="section-ver-desc">
            <p style="color:#445461;line-height:1.6;">${version.description}</p>
          </div>
        </div>
      </div>

      <!-- Tags -->
      <div class="section-block">
        <div class="section-inner">
          <div class="section-header" onclick="toggleSection('ver-tags')">
            ${CHEVRON_SVG}
            <h3>Tags</h3>
          </div>
          <div class="section-content" id="section-ver-tags">
            <div class="tags-inline">
              ${versionTags.map(([k, v]) => `<span class="tag"><span class="tag-key">${k}:</span> ${v}</span>`).join('')}
              <button class="tag-add-btn">+ Add tag</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Server Definition -->
      <div class="section-block">
        <div class="section-inner">
          <div class="section-header" onclick="toggleSection('ver-json')">
            ${CHEVRON_SVG}
            <h3>Server Definition</h3>
            <span class="section-meta">server.json · immutable</span>
          </div>
          <div class="section-content" id="section-ver-json">
            <div class="code-block"><pre style="margin:0;white-space:pre-wrap;">${highlightedJson}
    <span class="dim">... (${server.tools.length} tools total)</span></pre></div>
          </div>
        </div>
      </div>

      <!-- Tools Schema -->
      <div class="section-block" style="padding-bottom:24px;">
        <div class="section-inner" style="border-bottom:none;">
          <div class="section-header" onclick="toggleSection('ver-schema')">
            ${CHEVRON_SVG}
            <h3>Tools Schema</h3>
            <span class="section-meta">(${server.tools.length} tools)</span>
          </div>
          <div class="section-content" id="section-ver-schema">
            <table class="schema-table">
              <thead>
                <tr><th>Tool Name</th><th>Description</th><th>Input Schema</th></tr>
              </thead>
              <tbody>
                ${toolsToShow.map(t => `
                <tr>
                  <td><code class="tool-name">${t.name}</code></td>
                  <td style="color:#445461;">${t.desc}</td>
                  <td class="schema-type">${t.schema}</td>
                </tr>`).join('')}
              </tbody>
            </table>
            ${server.tools.length > 6 && !state.showAllTools ? `
            <div class="show-more">
              <a href="#" onclick="state.showAllTools=true;renderVersionView();return false;">Show all ${server.tools.length} tools</a>
            </div>` : ''}
          </div>
        </div>
      </div>
    </div>
  `;
}

function openRegisterModal() {
  const modal = document.getElementById('modal-register');
  document.getElementById('modal-register-inner').innerHTML = `
    <div class="modal-header">
      <h2>Register MCP Server</h2>
      <button class="modal-close" onclick="closeModal('register')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Name <span class="required">*</span></label>
        <input class="form-input" type="text" placeholder="e.g., My MCP Server" id="reg-name">
        <div class="form-hint">A unique name for this MCP server in the registry</div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" rows="3" placeholder="Describe what this MCP server does..." id="reg-desc"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Source Type <span class="required">*</span></label>
        <div class="seg-control">
          <button class="active" onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));this.classList.add('active');">Internal</button>
          <button onclick="this.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));this.classList.add('active');">External</button>
        </div>
        <div class="form-hint">Internal: deployed in-cluster via Lifecycle Operator. External: hosted outside the cluster.</div>
      </div>
      <div class="form-group">
        <label class="form-label">MCP Server Definition (server.json) <span class="required">*</span></label>
        <div class="tab-bar">
          <button class="active">Paste JSON</button>
          <button>Upload File</button>
          <button>From URL</button>
        </div>
        <div class="code-block" style="border-radius:0 0 var(--radius-sm) var(--radius-sm);max-height:140px;" contenteditable="true">
{
  <span class="key">"name"</span>: <span class="str">"my-mcp-server"</span>,
  <span class="key">"version"</span>: <span class="str">"1.0.0"</span>,
  <span class="key">"tools"</span>: <span class="punct">[</span><span class="punct">]</span>
<span class="punct">}</span></div>
        <div class="form-hint">The canonical MCP server payload. This becomes immutable once registered.</div>
      </div>
      <div class="form-group">
        <label class="form-label">Tags</label>
        <div class="tags-inline">
          <input type="text" placeholder="Add tag..." style="padding:3px 8px;border:1px dashed var(--color-border-input);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;color:var(--color-text-primary);outline:none;width:100px;">
        </div>
      </div>
      <div class="info-banner">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="#2272B4" stroke-width="1.5"/><path d="M8 6v1.5M8 10h.01" stroke="#2272B4" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>This will create <strong>Version 1</strong> in <strong>Draft</strong> state. You can publish it after review.</span>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('register')">Cancel</button>
      <button class="btn btn-primary" onclick="simulateRegister()">Register</button>
    </div>
  `;
  modal.classList.add('visible');
}

function simulateRegister() {
  closeModal('register');
  state.currentView = 'list';
  render();
}

function openTransitionModal(serverId, versionNum, fromState, toState) {
  document.querySelectorAll('.lifecycle-menu').forEach(m => m.classList.remove('visible'));

  const modal = document.getElementById('modal-transition');
  document.getElementById('modal-transition-inner').innerHTML = `
    <div class="modal-header">
      <h2 style="font-size:16px;">Transition Lifecycle State</h2>
      <button class="modal-close" onclick="closeModal('transition')">&times;</button>
    </div>
    <div class="modal-body">
      <div class="transition-visual">
        <span class="badge ${getLifecycleBadgeClass(fromState)}" style="padding:3px 10px;font-size:12px;font-weight:500;">${fromState}</span>
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none" class="transition-arrow"><path d="M2 7h16M14 3l4 4-4 4" stroke="#2272B4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="badge ${getLifecycleBadgeClass(toState)}" style="padding:3px 10px;font-size:12px;font-weight:500;">${toState}</span>
      </div>
      <div class="info-alert" style="margin-bottom:16px;">
        ${getTransitionMessage(toState)}
      </div>
      <div class="form-group" style="margin-bottom:16px;">
        <label class="form-label" style="font-size:12px;">Comment (optional)</label>
        <textarea class="form-textarea" rows="2" placeholder="Reason for this transition..."></textarea>
      </div>
      ${toState === 'Published' ? `
      <label style="display:flex;align-items:flex-start;gap:8px;font-size:12px;color:#445461;cursor:pointer;">
        <input type="checkbox" style="margin-top:2px;accent-color:var(--color-primary);">
        <span>Deprecate all other published versions of this MCP server</span>
      </label>` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('transition')">Cancel</button>
      <button class="btn btn-primary" onclick="executeTransition('${serverId}', ${versionNum}, '${toState}')">${getTransitionVerb(toState)}</button>
    </div>
  `;
  modal.classList.add('visible');
}

function executeTransition(serverId, versionNum, toState) {
  const server = getServer(serverId);
  if (server) {
    const version = getVersion(server, versionNum);
    if (version) {
      version.state = toState;
    }
  }
  closeModal('transition');
  render();
}

function closeModal(name) {
  document.getElementById('modal-' + name).classList.remove('visible');
}

// Close modals on overlay click, close lifecycle menus on outside click
document.addEventListener('click', (e) => {
  if (e.target.classList.contains('modal-overlay')) {
    e.target.classList.remove('visible');
  }
  if (!e.target.closest('.lifecycle-dropdown-wrapper')) {
    document.querySelectorAll('.lifecycle-menu').forEach(m => m.classList.remove('visible'));
  }
});

function render() {
  renderSidebar();
  document.getElementById('view-list').classList.toggle('active', state.currentView === 'list');
  document.getElementById('view-detail').classList.toggle('active', state.currentView === 'detail');
  document.getElementById('view-version').classList.toggle('active', state.currentView === 'version');
  if (state.currentView === 'list') renderListView();
  if (state.currentView === 'detail') renderDetailView();
  if (state.currentView === 'version') renderVersionView();
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  render();
});
</script>
</body>
</html>
